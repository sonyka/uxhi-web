    - generic [ref=e117]:
      - paragraph [ref=e121]: Conference Theme
      - paragraph [ref=e125]: This yearʻs UXHI Conference celebrates aloha ʻāina, love for the land.
      - generic [ref=e126]:
        - paragraph [ref=e127]: "More accurately translated, ʻāina means: that which feeds. When we care for the land, the land will care for us. When the land thrives, we thrive. And yet, Hawaiians have long honored a relationship with ʻāina that’s grounded in reciprocity rather than transaction."
        - paragraph [ref=e128]: This year’s theme calls on us to embrace our kuleana as designers—to care not only for the people we design for, but also for the resources we rely on, creating solutions that are sustainable, thoughtful, and in harmony with the world around us.
